{% extends 'base.html' %}
{% block title %}Employee Login — {{ company_name }}{% endblock %}
{% block body %}
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-header">
      <div class="auth-icon">👤</div>
      <h2>Employee Login</h2>
      <p>Sign in to access your leave portal</p>
    </div>

    <form method="POST" action="{{ url_for('employee_login') }}">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-control"
               placeholder="you@company.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-block mt-3">Sign In →</button>
    </form>

    <p class="text-center mt-3 fs-sm text-muted">
      Don't have an account?
      <a href="{{ url_for('employee_register') }}">Register here</a>
    </p>
    <p class="text-center mt-1 fs-sm text-muted">
      <a href="{{ url_for('index') }}">← Back to Home</a>
    </p>
  </div>
</div>
{% endblock %}
